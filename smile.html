<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrightSmile Dental Clinic</title>
    <style>
        :root { --med-teal: #2c7a7b; --soft-gray: #f7fafc; --clean-white: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--soft-gray); color: #2d3748; }
        header { background: var(--med-teal); color: white; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        .hero { 
            background: linear-gradient(rgba(44,122,123,0.8), rgba(44,122,123,0.8)), url('https://images.unsplash.com/photo-1629909613654-28e377c37b09?auto=format&fit=crop&w=1200&q=80');
            height: 400px; background-size: cover; display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .container { padding: 50px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid var(--med-teal); }
        .btn { background: var(--med-teal); color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div style="font-weight: bold; font-size: 1.5rem;">BrightSmile</div>
        <nav><a href="#" style="color: white; text-decoration: none;">Book Appointment</a></nav>
    </header>
    <section class="hero">
        <div>
            <h1>Advanced Dental Care for Your Family</h1>
            <p>Modern technology meets compassionate care.</p><br>
            <a href="https://wa.me/94743682842?text=I%20want%20to%20book%20a%20dental%20appointment" class="btn">Book Now</a>
        </div>
    </section>
    <div class="container">
        <div class="card"><h3>Teeth Whitening</h3><p>Get a brighter smile in just one session.</p></div>
        <div class="card"><h3>Orthodontics</h3><p>Braces and aligners for all ages.</p></div>
        <div class="card"><h3>Oral Surgery</h3><p>Safe and painless professional extractions.</p></div>
    </div>
</body>
</html>
