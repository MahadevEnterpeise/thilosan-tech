<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Brew Cafe</title>
    <style>
        :root { --coffee-brown: #3e2723; --latte-cream: #efebe9; --accent-gold: #c6a700; }
        body { margin: 0; font-family: 'Georgia', serif; background: var(--latte-cream); }
        header { background: var(--coffee-brown); color: white; text-align: center; padding: 40px 0; }
        .menu-section { padding: 50px 10%; display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
        .menu-item { width: 300px; background: white; border-radius: 0 0 15px 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .menu-item img { width: 100%; height: 200px; object-fit: cover; }
        .details { padding: 20px; text-align: center; }
        .price { color: var(--accent-gold); font-weight: bold; font-size: 1.2rem; }
        .footer { background: var(--coffee-brown); color: white; text-align: center; padding: 30px; }
    </style>
</head>
<body>
    <header>
        <h1>Urban Brew Cafe</h1>
        <p>Your Daily Dose of Craft Coffee</p>
    </header>
    <div class="menu-section">
        <div class="menu-item">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=500&q=80">
            <div class="details"><h3>Espresso</h3><p>Bold and intense.</p><div class="price">$3.50</div></div>
        </div>
        <div class="menu-item">
            <img src="https://images.unsplash.com/photo-1536939459926-301728717817?auto=format&fit=crop&w=500&q=80">
            <div class="details"><h3>Iced Latte</h3><p>Smooth and refreshing.</p><div class="price">$4.50</div></div>
        </div>
        <div class="menu-item">
            <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=500&q=80">
            <div class="details"><h3>Fresh Pastries</h3><p>Baked every morning.</p><div class="price">$5.00</div></div>
        </div>
    </div>
    <div class="footer">
        <p>Find us in the City Center | <a href="https://wa.me/94743682842" style="color: var(--accent-gold);">Order Now</a></p>
    </div>
</body>
</html>
